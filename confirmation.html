<!DOCTYPE html>
<html>

<head>

<title>Order Confirmation</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body class="bg-gray-100">

<div class="max-w-3xl mx-auto mt-20 bg-white p-8 rounded shadow">

<h1 class="text-3xl font-bold text-green-600 mb-4">
Order Confirmed
</h1>

<p class="mb-6">
Thank you for shopping with VastraAI!
</p>

<div id="order-summary"></div>

<a href="index.html">
<button class="bg-black text-white px-6 py-2 rounded mt-6">
Continue Shopping
</button>
</a>

</div>

<script>

const order = JSON.parse(localStorage.getItem("lastOrder"))

if(order){

let html = `
<p><b>Name:</b> ${order.name}</p>
<p><b>Address:</b> ${order.address}</p>
<p><b>Payment:</b> ${order.payment}</p>
<p><b>Date:</b> ${order.date}</p>

<h3 class="mt-4 font-bold">Items</h3>
`

order.items.forEach(i=>{

html += `<p>${i.id} x${i.qty}</p>`

})

html += `<p class="mt-4 font-bold">Total: ₹${order.total}</p>`

document.getElementById("order-summary").innerHTML = html

}

</script>

</body>

</html>
