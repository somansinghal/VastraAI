<!DOCTYPE html>
<html>

<head>

<title>Payment</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="bg-white shadow p-4 flex justify-between">

<h1 class="text-xl font-bold text-[#6a4f4b]">Payment</h1>

<a href="index.html">Home</a>

</header>

<section class="max-w-3xl mx-auto mt-10">

<h2 class="text-2xl font-bold mb-6">Checkout</h2>

<div class="bg-white p-6 rounded shadow">

<h3 class="font-bold mb-4">Customer Details</h3>

<input id="cust-name"
placeholder="Customer Name"
class="border p-2 w-full mb-3">

<input id="cust-address"
placeholder="Address"
class="border p-2 w-full mb-3">

<h3 class="font-bold mt-6 mb-3">Payment Method</h3>

<select id="payment-method" class="border p-2 w-full mb-6">

<option>UPI</option>
<option>Credit Card</option>
<option>Debit Card</option>
<option>Cash on Delivery</option>

</select>

<h3 class="font-bold mb-3">Order Summary</h3>

<div id="payment-items"></div>

<p class="font-bold mt-4">
Total: ₹<span id="payment-total"></span>
</p>

<button onclick="placeOrder()"
class="bg-green-600 text-white px-6 py-2 rounded mt-6 w-full">

Place Order

</button>

</div>

</section>

<script src="app.js"></script>

</body>

</html>
